<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>e-RPH Cikgu Sabariah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [status, setStatus] = useState("Memuatkan sistem...");

      useEffect(() => {
        try {
          // Ujian mudah untuk lihat sama ada React berjalan
          setStatus("Sistem Berjaya Dimuatkan");
        } catch (error) {
          setStatus("Ralat: " + error.message);
        }
      }, []);

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4">
          <div className="bg-white p-8 rounded-2xl shadow-lg border text-center">
            <h1 className="text-xl font-bold text-gray-800">Status Aplikasi</h1>
            <p className="mt-4 text-blue-600 font-semibold">{status}</p>
            <p className="text-xs text-gray-400 mt-4">Jika cikgu nampak mesej ini, React berfungsi dengan baik.</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
