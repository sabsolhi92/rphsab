<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>e-RPH Cikgu Sabariah</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Memuatkan React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    // Sistem Log Ralat
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('root').innerHTML = `
        <div style="padding:20px; color:red;">
          <h2>Ralat Ditemui:</h2>
          <p>${message}</p>
          <p>Baris: ${lineno}</p>
        </div>
      `;
    };

    const { useState, useEffect } = React;

    function App() {
      // Jika cikgu nampak mesej ini, React berjaya dijalankan
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-blue-50 text-blue-900">
          <i className="fas fa-check-circle text-6xl mb-4"></i>
          <h1 className="text-2xl font-bold">Sistem Berjaya Dijalankan!</h1>
          <p className="mt-2">Sistem RPH cikgu kini sedia untuk dipautkan semula dengan kod utama.</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
