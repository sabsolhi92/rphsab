        return () => unsubscribe();
      }, []);

      // 2. Tarik Rekod dari Firestore

        if (!user) return;
        
        const rphRef = db.collection('artifacts').doc(appIdStr).collection('users').doc(user.uid).collection('rphRecords');
        const unsubscribe = rphRef.onSnapshot((snapshot) => {
          const records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          // Susun data: yang terbaru (tarikh dicipta) di atas
          records.sort((a, b) => b.createdAt - a.createdAt);
          setRphList(records);
        }, (error) => {
          console.error("Ralat mengambil data:", error);
        });
        
        return () => unsubscribe();
      }, [user]);

          { tema: "TEMA 1: KEKELUARGAAN", units: ["Unit 1: Harapan Keluarga", "Unit 2: Keluargaku Hebat", "Unit 3: Hubungan yang Erat"] },
          { tema: "TEMA 2: KESIHATAN DAN KEBERSIHAN", units: ["Unit 4: Jagalah Dirimu", "Unit 5: Persekitaran yang Sihat", "Unit 6: Sayangi Dirimu"] },
          { tema: "TEMA 3: UTAMAKAN KESELAMATAN", units: ["Unit 7: Fikir Dahulu Sebelum Buat", "Unit 8: Seronoknya ke Sekolah", "Unit 9: Jangan Cuai"] },
          { tema: "TEMA 4: KEMASYARAKATAN", units: ["Unit 10: Komuniti Sepakat", "Unit 11: Baktiku untukmu", "Unit 12: Bersatu Teguh Bercerai Roboh"] },
          { tema: "TEMA 5: PERPADUAN", units: ["Unit 13: Muafakat Membawa Berkat", "Unit 14: Berganding Bahu", "Unit 15: Semangat Kekitaan"] },
          { tema: "TEMA 6: KELESTARIAN ALAM", units: ["Unit 16: Indahnya Negeriku", "Unit 17: Indahnya Alamku", "Unit 18: Kita dan Alam"] },
          { tema: "TEMA 7: PERTANIAN DAN PENTERNAKAN", units: ["Unit 19: Pertanian ialah Perniagaan", "Unit 20: Penternak Berjaya", "Unit 21: Hasil Bumiku Bertuah"] },
          { tema: "TEMA 8: EKONOMI, KEUSAHAWANAN DAN PENGURUSAN KEWANGAN", units: ["Unit 22: Titik Peluh Kita", "Unit 23: Usaha Jaya", "Unit 24: Bijak Mengurus Wang"] },
          { tema: "TEMA 9: SAINS, TEKNOLOGI DAN INOVASI", units: ["Unit 25: Sains dalam Kehidupan", "Unit 26: Teknologi Terkini", "Unit 27: Inovasi Ciptaanku"] },
          { tema: "TEMA 10: INTEGRITI", units: ["Unit 28: Bertanggungjawab", "Unit 29: Patuhi Arahan", "Unit 30: Indahnya Amalan Baik"] }
        ];

        const tajukBMTahun6 = [
          { tema: "TEMA 1: KEKELUARGAAN", units: ["Unit 1: Bakat Unik", "Unit 2: Tanggungjawab Keluarga", "Unit 3: Mari Mengembara"] },
          { tema: "TEMA 2: KESIHATAN DAN KEBERSIHAN", units: ["Unit 4: Badan Sihat Hidup Gembira", "Unit 5: Kebersihan Asas Kesihatan", "Unit 6: Amalan Cara Hidup Sihat"] },
          { tema: "TEMA 3: KESELAMATAN", units: ["Unit 7: Keselamatan Diri Tanggungjawab Bersama", "Unit 8: Keselamatan di Alam Siber", "Unit 9: Awasi Keselamatan Diri"] },
          { tema: "TEMA 4: PERPADUAN", units: ["Unit 10: Berkat Perpaduan", "Unit 11: Bagai Aur dengan Tebing", "Unit 12: Bersama-sama Berpadu Tenaga"] },
          { tema: "TEMA 5: KEBUDAYAAN, KESENIAN DAN ESTETIKA", units: ["Unit 13: Warisan Kesenian", "Unit 14: Cantiknya Budaya Bangsa", "Unit 15: Khazanah Berharga"] },
          { tema: "TEMA 6: SAINS, TEKNOLOGI DAN INOVASI", units: ["Unit 16: Ajaibnya Sains", "Unit 17: Teknologi Kreatif", "Unit 18: Inovasi"] },
          { tema: "TEMA 7: KELESTARIAN ALAM", units: ["Unit 19: Indahnya Bumiku", "Unit 20: Sayangi Persekitaran Kita", "Unit 21: Alam Sejahtera"] },
          { tema: "TEMA 8: PERTANIAN DAN PENTERNAKAN", units: ["Unit 22: Petani Moden", "Unit 23: Penternak Berjaya", "Unit 24: Inovasi Pertanian dan Penternakan"] },
          { tema: "TEMA 9: EKONOMI, KEUSAHAWANAN DAN PENGURUSAN KEWANGAN", units: ["Unit 25: Menjanakan Pendapatan", "Unit 26: Usahawan Berjaya", "Unit 27: Mengurus Wang"] },
          { tema: "TEMA 10: INTEGRITI", units: ["Unit 28: Kejujuran", "Unit 29: Prinsip Hidup", "Unit 30: Amanah"] }
        ];

        const getTemaList = () => {
          if (selectedSubject === 'Bahasa Melayu') {
            if (selectedYear === 'Tahun 6') return tajukBMTahun6;
            if (selectedYear === 'Tahun 5') return tajukBMTahun5;
            if (selectedYear === 'Tahun 3') return tajukBMTahun3;
          }
          return [];
        };

        const students = getStudentsForReflection(selectedSubject, selectedYear);
        const currentTemaList = getTemaList();

        const [formData, setFormData] = useState({
          minggu: '2',
          tarikh: '19.1.2026',
          hari: 'ISNIN',
          masa: '0710-0810\n1030-1130',
          kelas: selectedSubject === 'TMK' && selectedYear === 'Tahun 6' ? '6BP' : '6BD',
          tema: selectedSubject === 'Bahasa Melayu' && selectedYear === 'Tahun 6' ? 'TEMA 1: KEKELUARGAAN - Unit 1: Bakat Unik' : 
                selectedSubject === 'Bahasa Melayu' && selectedYear === 'Tahun 5' ? 'TEMA 1: KEKELUARGAAN - Unit 1: Harapan Keluarga' : 
                selectedSubject === 'Bahasa Melayu' && selectedYear === 'Tahun 3' ? 'TEMA 1: KEKELUARGAAN - Unit 1: Seronok Bersama-sama Keluarga' : 
                'Kekeluargaan - Unit 1 : Bakat unik',
          standardKandungan: '1.1 Mendengar atau mengecam isyarat serta memberikan respons semasa berkomunikasi dalam situasi formal dan tidak formal.',
          standardPembelajaran: '1.1.1 Mendengar atau melihat, mengecam sebutan atau isyarat dan menyebut atau mengisyarat semula ujaran yang terdapat dalam pelbagai situasi.',
          objektif: 'Pada akhir pembelajaran, murid dapat:\n\n1.  Mengecam sekurang-kurangnya 3 perkataan (meniup, rekoder, sokongan) melalui visual dan kod tangan.\n2.  Menyebut atau mengisyarat semula dialog pendek dengan betul.',
          aktiviti: '1.  Guru tunjuk gambar halaman 2 (perkhemahan & memancing).\n2.  Guru berisyarat keluarga, khemah, pancing.\n3.  Guru perkenalkan perkataan: susun, pinggan, pasang, khemah, pancing, ikan menggunakan kad gambar.\n4.  Guru tunjuk dan murid meniru kod tangan bagi setiap perkataan.\n5.  Murid memadankan kad perkataan dengan gambar di papan putih/meja\n6.  Ulangan isyarat 6 perkataan',
          penggunaanTMK: 'Paparan Slaid PowerPoint / Video Interaktif'
        });

        const [copyStatus, setCopyStatus] = useState('');
        const [isGeneratingObj, setIsGeneratingObj] = useState(false);
        const [isGeneratingAct, setIsGeneratingAct] = useState(false);
        const [isSaving, setIsSaving] = useState(false);
        const [saveStatus, setSaveStatus] = useState('');

        const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

        // AI Simulation
        const handleAIAssist = (type) => {
          if (type === 'objektif') {
            setIsGeneratingObj(true);
            setTimeout(() => {
              setFormData(prev => ({ ...prev, objektif: 'Pada akhir pembelajaran, murid dapat:\n\n1. Mengecam 2 perkataan baru dengan bimbingan guru menggunakan isyarat.\n2. Memadankan kad gambar dengan perkataan yang betul.' }));
              setIsGeneratingObj(false);
            }, 1500);
          } else if (type === 'aktiviti') {
            setIsGeneratingAct(true);
            setTimeout(() => {
              setFormData(prev => ({ ...prev, aktiviti: '1. Guru menayangkan video animasi/gambar bersaiz besar di hadapan kelas.\n2. Guru membimbing murid menyebut atau mengisyaratkan nama objek satu persatu.\n3. Murid tampil ke hadapan untuk memadankan kad perkataan dengan gambar.\n4. Latih tubi isyarat bersama rakan secara berpasangan.\n5. Guru memberi peneguhan positif (pujian/token).' }));
              setIsGeneratingAct(false);
            }, 1500);
          }
        };

        // Google Docs Copy
        const copyToClipboard = () => {
          const tableEl = document.getElementById('rph-table-export');
          const range = document.createRange();
          range.selectNode(tableEl);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          try {
            document.execCommand('copy');
            setCopyStatus('success');
            setTimeout(() => setCopyStatus(''), 5000);
          } catch (err) { setCopyStatus('error'); }
          sel.removeAllRanges();
        };

        // Save to Firebase
        const handleSaveRPH = async () => {
          if (!user) return;
          setIsSaving(true);
          try {
            const rphRef = db.collection('artifacts').doc(appIdStr).collection('users').doc(user.uid).collection('rphRecords');
            await rphRef.add({ ...formData, subjek: selectedSubject, tahun: selectedYear, createdAt: Date.now() });
            setSaveStatus('success');
            setTimeout(() => setSaveStatus(''), 3000);
          } catch (error) {
            console.error("Ralat menyimpan RPH:", error);
            setSaveStatus('error');
          }
          setIsSaving(false);
        };

        const getColSpan = (total, index) => {
          if (total === 1) return 4;
          if (total === 2) return 2; 
          if (total === 3) return index === 1 ? 2 : 1; 
          if (total === 4) return 1; 
          return 1;
        };

        return (
          <div className="flex flex-col min-h-screen bg-slate-50">
            <Header title={`Borang RPH: ${selectedSubject} (${selectedYear})`} />
            <div className="p-4 flex-1 max-w-3xl mx-auto w-full space-y-6">
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <h3 className="font-bold text-gray-800 border-b pb-2 mb-4">Maklumat Asas</h3>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="block text-xs font-semibold text-gray-600 mb-1">Minggu</label><input type="text" name="minggu" value={formData.minggu} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" /></div>
                  <div><label className="block text-xs font-semibold text-gray-600 mb-1">Tarikh</label><input type="text" name="tarikh" value={formData.tarikh} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" /></div>
                  <div><label className="block text-xs font-semibold text-gray-600 mb-1">Hari</label><input type="text" name="hari" value={formData.hari} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" /></div>
                  <div><label className="block text-xs font-semibold text-gray-600 mb-1">Kelas</label><input type="text" name="kelas" value={formData.kelas} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" /></div>
                </div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Masa</label><textarea rows="2" name="masa" value={formData.masa} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea></div>

                <h3 className="font-bold text-gray-800 border-b pb-2 mt-6 mb-4">Kandungan Pembelajaran</h3>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">Tema / Tajuk</label>
                  {currentTemaList.length > 0 ? (
                    <select name="tema" value={formData.tema} onChange={handleChange} className="w-full border border-gray-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 text-gray-700">
                      <option value="">-- Sila Pilih Tema dan Unit --</option>
                      {currentTemaList.map((kumpulan, idx) => (
                        <optgroup key={idx} label={kumpulan.tema}>
                          {kumpulan.units.map((unit, uIdx) => <option key={uIdx} value={`${kumpulan.tema} - ${unit}`}>{unit}</option>)}
                        </optgroup>
                      ))}
                    </select>
                  ) : (
                    <textarea rows="2" name="tema" value={formData.tema} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea>
                  )}
                </div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Standard Kandungan</label><textarea rows="2" name="standardKandungan" value={formData.standardKandungan} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea></div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Standard Pembelajaran</label><textarea rows="3" name="standardPembelajaran" value={formData.standardPembelajaran} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea></div>
                
                <div>
                  <div className="flex justify-between items-end mb-1">
                    <label className="block text-xs font-semibold text-gray-600">Objektif</label>
                    <button onClick={() => handleAIAssist('objektif')} disabled={isGeneratingObj} className="flex items-center text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md hover:bg-indigo-100 transition-colors">
                      {isGeneratingObj ? <i className="fas fa-spinner fa-spin mr-1"></i> : <i className="fas fa-magic mr-1"></i>} Bantuan AI
                    </button>
                  </div>
                  <textarea rows="5" name="objektif" value={formData.objektif} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea>
                </div>
                <div>
                  <div className="flex justify-between items-end mb-1">
                    <label className="block text-xs font-semibold text-gray-600">Aktiviti Pengajaran (4-5 Langkah)</label>
                    <button onClick={() => handleAIAssist('aktiviti')} disabled={isGeneratingAct} className="flex items-center text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md hover:bg-indigo-100 transition-colors">
                      {isGeneratingAct ? <i className="fas fa-spinner fa-spin mr-1"></i> : <i className="fas fa-magic mr-1"></i>} Bantuan AI
                    </button>
                  </div>
                  <textarea rows="6" name="aktiviti" value={formData.aktiviti} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea>
                </div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Penggunaan TMK</label><input type="text" name="penggunaanTMK" value={formData.penggunaanTMK} onChange={handleChange} className="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" /></div>
              </div>

              {/* PRATONTON JADUAL GOOGLE DOCS */}
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                 <h3 className="font-bold text-gray-800 mb-4">Pratonton Jadual Google Docs</h3>
                 <div className="min-w-[700px] pointer-events-none select-none bg-white p-2">
                   <table id="rph-table-export" style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'Arial, sans-serif', fontSize: '10pt', color: 'black' }}>
                    <tbody>
                      <tr><td colSpan="6" style={{ border: '1px solid black', padding: '8px', textAlign: 'center', fontWeight: 'bold', backgroundColor: '#d9ead3' }}>{selectedSubject.toUpperCase() || 'BAHASA MELAYU'}</td></tr>
                      <tr>
                        <td rowSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', width: '15%' }}>MINGGU</td>
                        <td rowSpan="2" style={{ border: '1px solid black', padding: '8px', textAlign: 'center', width: '10%' }}>{formData.minggu}</td>
                        <td style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', width: '15%', textAlign: 'center' }}>TARIKH</td>
                        <td style={{ border: '1px solid black', padding: '8px', textAlign: 'center', width: '22%' }}>{formData.tarikh}</td>
                        <td style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', width: '15%', textAlign: 'center' }}>MASA</td>
                        <td style={{ border: '1px solid black', padding: '8px', textAlign: 'center', width: '23%', whiteSpace: 'pre-wrap' }}>{formData.masa}</td>
                      </tr>
                      <tr>
                        <td style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', textAlign: 'center' }}>HARI</td>
                        <td style={{ border: '1px solid black', padding: '8px', textAlign: 'center' }}>{formData.hari}</td>
                        <td style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', textAlign: 'center' }}>KELAS</td>
                        <td style={{ border: '1px solid black', padding: '8px', textAlign: 'center' }}>{formData.kelas}</td>
                      </tr>
                      <tr><td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3' }}>TEMA / TAJUK</td><td colSpan="4" style={{ border: '1px solid black', padding: '8px', whiteSpace: 'pre-wrap' }}>{formData.tema}</td></tr>
                      <tr><td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3' }}>STANDARD KANDUNGAN</td><td colSpan="4" style={{ border: '1px solid black', padding: '8px', whiteSpace: 'pre-wrap' }}>{formData.standardKandungan}</td></tr>
                      <tr><td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3' }}>STANDARD PEMBELAJARAN</td><td colSpan="4" style={{ border: '1px solid black', padding: '8px', whiteSpace: 'pre-wrap' }}>{formData.standardPembelajaran}</td></tr>
                      <tr><td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', verticalAlign: 'top' }}>OBJEKTIF</td><td colSpan="4" style={{ border: '1px solid black', padding: '8px', whiteSpace: 'pre-wrap', verticalAlign: 'top' }}>{formData.objektif}</td></tr>
                      <tr><td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', verticalAlign: 'top' }}>AKTIVITI PENGAJARAN</td><td colSpan="4" style={{ border: '1px solid black', padding: '8px', whiteSpace: 'pre-wrap', verticalAlign: 'top' }}>{formData.aktiviti}</td></tr>
                      <tr><td colSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', verticalAlign: 'top' }}>PENGGUNAAN TMK</td><td colSpan="4" style={{ border: '1px solid black', padding: '8px', whiteSpace: 'pre-wrap', verticalAlign: 'top' }}>{formData.penggunaanTMK}</td></tr>
                      <tr>
                        <td colSpan="2" rowSpan="2" style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold', backgroundColor: '#d9ead3', verticalAlign: 'top' }}>REFLEKSI</td>
                        {students.map((student, index) => <td key={`name-${index}`} colSpan={getColSpan(students.length, index)} style={{ border: '1px solid black', padding: '8px', textAlign: 'center' }}>{student}</td>)}
                      </tr>
                      <tr>{students.map((student, index) => <td key={`box-${index}`} colSpan={getColSpan(students.length, index)} style={{ border: '1px solid black', padding: '8px', height: '60px' }}></td>)}</tr>
                    </tbody>
                  </table>
                 </div>
              </div>

              <div className="flex gap-3 pb-8">
                <button onClick={copyToClipboard} className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl text-white font-semibold shadow-sm transition-all ${copyStatus === 'success' ? 'bg-green-600' : 'bg-blue-600 hover:bg-blue-700 active:scale-95'}`}>
                  {copyStatus === 'success' ? <><i className="fas fa-check"></i> Berjaya Disalin!</> : <><i className="fas fa-copy"></i> Salin ke Google Docs</>}
                </button>
                <button onClick={handleSaveRPH} disabled={isSaving} className={`flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl font-semibold transition-colors active:scale-95 disabled:opacity-70 ${saveStatus === 'success' ? 'bg-green-100 text-green-700' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'}`}>
                  {isSaving ? <i className="fas fa-spinner fa-spin"></i> : saveStatus === 'success' ? <i className="fas fa-check"></i> : <i className="fas fa-save"></i>} {saveStatus === 'success' ? 'Disimpan' : 'Simpan'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      // Navigasi Utama
      const handleSelectYear = (subject, year) => {
        setSelectedSubject(subject);
        setSelectedYear(year);
        setCurrentView('rph-form');
      };

      switch (currentView) {
        case 'bm': return <SubMenuView title="Bahasa Melayu" options={['Tahun 3', 'Tahun 4', 'Tahun 5', 'Tahun 6']} onSelect={(year) => handleSelectYear('Bahasa Melayu', year)} />;
        case 'tmk': return <SubMenuView title="Teknologi Maklumat dan Komunikasi" options={['Tahun 4', 'Tahun 5', 'Tahun 6']} onSelect={(year) => handleSelectYear('TMK', year)} />;
        case 'rph-form': return <RphFormView />;
        case 'cuti': return <PlaceholderView title="Cuti & Program" bgClass="bg-amber-500" />;
        case 'kehadiran': return <KehadiranView />;
        case 'rekod': return <RekodRPHView />;
        case 'semakan': return <SemakanMingguView />;
        case 'home': default: return <HomeView />;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
